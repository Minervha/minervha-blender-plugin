schema_version = "1.0.0"

id = "minervha_material_exporter"
version = "0.1.0"
name = "Minervha Material Exporter"
tagline = "Export Blender materials to Wild Life saves"
maintainer = "Minervha Studio <lou.31cool@gmail.com>"
type = "add-on"

# Add-on tags from Blender's allowed list.
tags = ["Import-Export", "Material"]

blender_version_min = "4.2.0"

# bpy add-ons are derivative works of Blender → must be GPL-compatible.
license = ["SPDX:GPL-3.0-or-later"]

# The add-on reads texture files and writes .txt / .wlsave exports to a
# user-chosen location (outside the extension directory).
[permissions]
files = "Read scene textures and write .txt / .wlsave exports to a location you choose"
