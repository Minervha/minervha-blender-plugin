schema_version = "1.0.0"

id = "minervha_material_exporter"
version = "0.7.3"
name = "Minervha Exporter"
tagline = "Export Blender materials and scenes to Wild Life saves"
maintainer = "Minervha Studio <217040744+Minervha@users.noreply.github.com>"
type = "add-on"

# Add-on tags from Blender's allowed list.
tags = ["Import-Export", "Material"]

blender_version_min = "4.2.0"

# bpy add-ons are derivative works of Blender → must be GPL-compatible.
license = ["SPDX:GPL-3.0-or-later"]

# The add-on reads texture files and writes a .wlsave export to a user-chosen
# location (outside the extension directory).
[permissions]
files = "Read scene textures and write a .wlsave to a chosen folder"
